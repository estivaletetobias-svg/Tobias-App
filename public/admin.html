<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — IA Personal Coach</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0a0a0f;
            --surface: #111118;
            --surface2: #1a1a24;
            --border: #2a2a3a;
            --accent: #7c6aff;
            --accent2: #4fc8ff;
            --green: #22c55e;
            --red: #ef4444;
            --yellow: #f59e0b;
            --text: #e8e8f0;
            --muted: #6b6b85;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* Login Screen */
        #login-screen {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(ellipse at center, #1a1040 0%, #0a0a0f 70%);
        }

        .login-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 48px 40px;
            width: 380px;
            text-align: center;
        }

        .login-card .logo {
            font-size: 40px;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 8px;
        }

        .login-card h1 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .login-card p {
            color: var(--muted);
            font-size: 13px;
            margin-bottom: 32px;
        }

        .input-field {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px 16px;
            color: var(--text);
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            margin-bottom: 16px;
            outline: none;
            transition: border-color .2s;
        }

        .input-field:focus {
            border-color: var(--accent);
        }

        .btn-primary {
            width: 100%;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: opacity .2s;
        }

        .btn-primary:hover {
            opacity: .85;
        }

        .btn-primary:disabled {
            opacity: .5;
            cursor: not-allowed;
        }

        .error-msg {
            color: var(--red);
            font-size: 13px;
            margin-top: 12px;
        }

        /* Dashboard */
        #dashboard {
            display: none;
        }

        .topbar {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 16px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .topbar-brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .topbar-brand .logo {
            font-size: 24px;
            font-weight: 700;
            color: var(--accent);
        }

        .topbar-brand span {
            color: var(--muted);
            font-size: 13px;
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .btn-refresh {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: border-color .2s;
        }

        .btn-refresh:hover {
            border-color: var(--accent);
        }

        .content {
            padding: 32px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 16px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
        }

        .stat-card .label {
            color: var(--muted);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: .5px;
            margin-bottom: 8px;
        }

        .stat-card .value {
            font-size: 32px;
            font-weight: 700;
        }

        .stat-card .sub {
            color: var(--muted);
            font-size: 12px;
            margin-top: 4px;
        }

        .stat-card.accent .value {
            color: var(--accent);
        }

        .stat-card.green .value {
            color: var(--green);
        }

        .stat-card.red .value {
            color: var(--red);
        }

        .stat-card.yellow .value {
            color: var(--yellow);
        }

        .stat-card.blue .value {
            color: var(--accent2);
        }

        /* Filters */
        .filters {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            align-items: center;
        }

        .filter-input {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 16px;
            color: var(--text);
            font-size: 13px;
            font-family: 'Inter', sans-serif;
            outline: none;
            width: 260px;
        }

        .filter-input:focus {
            border-color: var(--accent);
        }

        .filter-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--muted);
            padding: 10px 16px;
            border-radius: 10px;
            font-size: 13px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: all .2s;
        }

        .filter-btn.active,
        .filter-btn:hover {
            border-color: var(--accent);
            color: var(--text);
        }

        /* Table */
        .table-wrap {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: var(--surface2);
            color: var(--muted);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: .5px;
            padding: 14px 20px;
            text-align: left;
            font-weight: 500;
        }

        td {
            padding: 16px 20px;
            border-top: 1px solid var(--border);
            font-size: 14px;
            vertical-align: middle;
        }

        tr:hover td {
            background: var(--surface2);
        }

        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 99px;
            font-size: 11px;
            font-weight: 600;
        }

        .badge-active {
            background: rgba(34, 197, 94, .15);
            color: var(--green);
        }

        .badge-inactive {
            background: rgba(239, 68, 68, .15);
            color: var(--red);
        }

        .badge-risk {
            background: rgba(245, 158, 11, .15);
            color: var(--yellow);
        }

        .badge-ok {
            background: rgba(79, 200, 255, .1);
            color: var(--accent2);
        }

        .score-bar {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .score-track {
            flex: 1;
            height: 6px;
            background: var(--surface2);
            border-radius: 3px;
            overflow: hidden;
        }

        .score-fill {
            height: 100%;
            border-radius: 3px;
            background: var(--accent);
            transition: width .5s;
        }

        .score-num {
            font-weight: 600;
            width: 28px;
            text-align: right;
            font-size: 13px;
        }

        .name-cell {
            font-weight: 600;
        }

        .email-cell {
            color: var(--muted);
            font-size: 12px;
        }

        /* Empty */
        .empty {
            text-align: center;
            padding: 60px 20px;
            color: var(--muted);
        }

        /* Loading */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 200px;
            color: var(--muted);
            gap: 12px;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin .8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Section title */
        .section-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .dot-red {
            background: var(--red);
            box-shadow: 0 0 6px var(--red);
        }

        /* Responsive */
        @media (max-width: 1100px) {
            .stats-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 700px) {
            .stats-grid {
                grid-template-columns: 1fr 1fr;
            }

            .content {
                padding: 16px;
            }

            .topbar {
                padding: 12px 16px;
            }
        }
    </style>
</head>

<body>

    <!-- Login -->
    <div id="login-screen">
        <div class="login-card">
            <div class="logo">IA</div>
            <h1>Painel do Fundador</h1>
            <p>Acesso restrito — Tobias Estivalete</p>
            <input type="password" class="input-field" id="secret-input" placeholder="Senha de acesso"
                autocomplete="current-password">
            <button class="btn-primary" id="login-btn" onclick="doLogin()">Entrar</button>
            <p class="error-msg" id="login-error"></p>
        </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboard">
        <div class="topbar">
            <div class="topbar-brand">
                <div class="logo">IA</div>
                <span>Painel do Fundador</span>
            </div>
            <div class="topbar-right">
                <span id="last-updated" style="color:var(--muted);font-size:12px"></span>
                <button class="btn-refresh" onclick="loadData()">↻ Atualizar</button>
                <button class="btn-refresh" onclick="doLogout()">Sair</button>
            </div>
        </div>

        <div class="content">
            <!-- Stats -->
            <div class="stats-grid" id="stats-grid">
                <div class="loading" style="grid-column:1/-1">
                    <div class="spinner"></div> Carregando...
                </div>
            </div>

            <!-- At Risk Alert -->
            <div id="risk-section" style="display:none;margin-bottom:32px">
                <div class="section-title">
                    <div class="dot dot-red"></div> Alunos em Risco (sem treinar há 4+ dias)
                </div>
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>Aluno</th>
                                <th>Email</th>
                                <th>Dias sem treinar</th>
                                <th>Score</th>
                                <th>Local</th>
                            </tr>
                        </thead>
                        <tbody id="risk-table"></tbody>
                    </table>
                </div>
            </div>

            <!-- All Clients -->
            <div class="section-title" style="margin-bottom:12px">Todos os Alunos</div>
            <div class="filters">
                <input type="text" class="filter-input" id="search-input" placeholder="Buscar por nome ou email..."
                    oninput="filterClients()">
                <button class="filter-btn active" id="filter-all" onclick="setFilter('all')">Todos</button>
                <button class="filter-btn" id="filter-active" onclick="setFilter('active')">Ativos</button>
                <button class="filter-btn" id="filter-onboarded" onclick="setFilter('onboarded')">Com
                    Onboarding</button>
                <button class="filter-btn" id="filter-risk" onclick="setFilter('risk')">Em Risco</button>
            </div>

            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Aluno</th>
                            <th>Status</th>
                            <th>Discipline Score</th>
                            <th>Último Treino</th>
                            <th>Onboarding</th>
                            <th>Local</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="clients-table">
                        <tr>
                            <td colspan="6">
                                <div class="loading">
                                    <div class="spinner"></div> Carregando...
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let adminSecret = '';
        let allClients = [];
        let currentFilter = 'all';

        // Login
        document.getElementById('secret-input').addEventListener('keydown', e => {
            if (e.key === 'Enter') doLogin();
        });

        async function doLogin() {
            const secret = document.getElementById('secret-input').value.trim();
            if (!secret) return;

            const btn = document.getElementById('login-btn');
            btn.disabled = true;
            btn.textContent = 'Verificando...';

            const res = await fetch('/api/admin/dashboard', {
                headers: { 'x-admin-secret': secret }
            });

            if (res.ok) {
                adminSecret = secret;
                sessionStorage.setItem('admin_secret', secret);
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                const data = await res.json();
                renderDashboard(data.data);
            } else {
                document.getElementById('login-error').textContent = 'Senha incorreta.';
                btn.disabled = false;
                btn.textContent = 'Entrar';
            }
        }

        function doLogout() {
            sessionStorage.removeItem('admin_secret');
            location.reload();
        }

        // Auto-login se tiver secret guardado
        window.addEventListener('load', async () => {
            const saved = sessionStorage.getItem('admin_secret');
            if (saved) {
                adminSecret = saved;
                const res = await fetch('/api/admin/dashboard', {
                    headers: { 'x-admin-secret': saved }
                });
                if (res.ok) {
                    document.getElementById('login-screen').style.display = 'none';
                    document.getElementById('dashboard').style.display = 'block';
                    const data = await res.json();
                    renderDashboard(data.data);
                } else {
                    sessionStorage.removeItem('admin_secret');
                }
            }
        });

        async function loadData() {
            const res = await fetch('/api/admin/dashboard', {
                headers: { 'x-admin-secret': adminSecret }
            });
            if (res.ok) {
                const data = await res.json();
                renderDashboard(data.data);
            }
        }

        function renderDashboard({ stats, clients }) {
            allClients = clients;

            // Stats
            document.getElementById('stats-grid').innerHTML = `
      <div class="stat-card accent">
        <div class="label">Total de Alunos</div>
        <div class="value">${stats.total}</div>
        <div class="sub">contas cadastradas</div>
      </div>
      <div class="stat-card green">
        <div class="label">Assinaturas Ativas</div>
        <div class="value">${stats.active}</div>
        <div class="sub">acesso liberado</div>
      </div>
      <div class="stat-card blue">
        <div class="label">Com Onboarding</div>
        <div class="value">${stats.onboarded}</div>
        <div class="sub">conectados à IA</div>
      </div>
      <div class="stat-card ${stats.at_risk > 0 ? 'red' : 'green'}">
        <div class="label">Em Risco</div>
        <div class="value">${stats.at_risk}</div>
        <div class="sub">4+ dias sem treinar</div>
      </div>
      <div class="stat-card yellow">
        <div class="label">Score Médio</div>
        <div class="value">${stats.avg_score}</div>
        <div class="sub">disciplina geral</div>
      </div>
    `;

            // At-risk section
            const riskClients = clients.filter(c => c.is_active && c.at_risk);
            const riskSection = document.getElementById('risk-section');
            if (riskClients.length > 0) {
                riskSection.style.display = 'block';
                document.getElementById('risk-table').innerHTML = riskClients.map(c => `
        <tr>
          <td><div class="name-cell">${c.name}</div></td>
          <td><div class="email-cell">${c.email}</div></td>
          <td><span class="badge badge-risk">${c.last_workout ? c.last_workout.days_ago + ' dias' : 'nunca treinou'}</span></td>
          <td>
            <div class="score-bar">
              <div class="score-track"><div class="score-fill" style="width:${c.discipline_score}%"></div></div>
              <div class="score-num">${c.discipline_score}</div>
            </div>
          </td>
          <td>${c.workout_location}</td>
        </tr>
      `).join('');
            } else {
                riskSection.style.display = 'none';
            }

            renderTable();
            document.getElementById('last-updated').textContent = 'Atualizado: ' + new Date().toLocaleTimeString('pt-BR');
        }

        function renderTable() {
            const search = document.getElementById('search-input').value.toLowerCase();
            let list = allClients.filter(c => {
                const matchSearch = !search || c.name.toLowerCase().includes(search) || c.email.toLowerCase().includes(search);
                const matchFilter =
                    currentFilter === 'all' ? true :
                        currentFilter === 'active' ? c.is_active :
                            currentFilter === 'onboarded' ? c.has_onboarding :
                                currentFilter === 'risk' ? (c.is_active && c.at_risk) : true;
                return matchSearch && matchFilter;
            });

            if (!list.length) {
                document.getElementById('clients-table').innerHTML = `<tr><td colspan="6"><div class="empty">Nenhum aluno encontrado</div></td></tr>`;
                return;
            }

            document.getElementById('clients-table').innerHTML = list.map(c => {
                const lastTrain = c.last_workout
                    ? `<span class="${c.at_risk ? 'badge badge-risk' : 'badge badge-ok'}">${c.last_workout.days_ago === 0 ? 'Hoje' : c.last_workout.days_ago + ' dias atrás'}</span>`
                    : `<span class="badge badge-inactive">Nunca</span>`;

                return `
        <tr>
          <td>
            <div class="name-cell">${c.name}</div>
            <div class="email-cell">${c.email}</div>
          </td>
          <td>
            <span class="badge ${c.is_active ? 'badge-active' : 'badge-inactive'}">
              ${c.is_active ? 'Ativo' : 'Inativo'}
            </span>
          </td>
          <td>
            <div class="score-bar">
              <div class="score-track"><div class="score-fill" style="width:${c.discipline_score}%"></div></div>
              <div class="score-num">${c.discipline_score}</div>
            </div>
          </td>
          <td>${lastTrain}</td>
          <td>
            <span class="badge ${c.has_onboarding ? 'badge-ok' : 'badge-inactive'}">
              ${c.has_onboarding ? 'Concluído' : 'Pendente'}
            </span>
          </td>
          <td style="color:var(--muted);font-size:13px">${c.workout_location}</td>
          <td>
            <div style="display:flex;gap:6px;flex-wrap:wrap">
              <button onclick="toggleActive('${c.id}',${!c.is_active})" style="background:${c.is_active ? 'rgba(239,68,68,.15)' : 'rgba(34,197,94,.15)'};color:${c.is_active ? 'var(--red)' : 'var(--green)'};border:none;border-radius:6px;padding:5px 10px;font-size:11px;font-weight:600;cursor:pointer;font-family:Inter,sans-serif">${c.is_active ? 'Desativar' : 'Ativar'}</button>
              <button onclick="deleteUser('${c.id}','${c.name}')" style="background:rgba(239,68,68,.1);color:var(--red);border:none;border-radius:6px;padding:5px 10px;font-size:11px;font-weight:600;cursor:pointer;font-family:Inter,sans-serif">Deletar</button>
            </div>
          </td>
        </tr>
      `;
            }).join('');
        }

        function filterClients() { renderTable(); }

        function setFilter(f) {
            currentFilter = f;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('filter-' + f).classList.add('active');
            renderTable();
        }

        async function toggleActive(userId, newState) {
            const res = await fetch('/api/admin/dashboard', {
                method: 'PATCH',
                headers: { 'x-admin-secret': adminSecret, 'Content-Type': 'application/json' },
                body: JSON.stringify({ user_id: userId, is_active: newState })
            });
            if (res.ok) {
                const c = allClients.find(c => c.id === userId);
                if (c) c.is_active = newState;
                renderTable();
            } else {
                alert('Erro ao atualizar status.');
            }
        }

        async function deleteUser(userId, name) {
            if (!confirm(`Tem certeza que deseja deletar "${name}"? Esta ação não pode ser desfeita.`)) return;
            const res = await fetch('/api/admin/dashboard', {
                method: 'DELETE',
                headers: { 'x-admin-secret': adminSecret, 'Content-Type': 'application/json' },
                body: JSON.stringify({ user_id: userId })
            });
            if (res.ok) {
                allClients = allClients.filter(c => c.id !== userId);
                renderTable();
                await loadData(); // recarregar stats
            } else {
                alert('Erro ao deletar usuário.');
            }
        }
    </script>
</body>

</html>
